<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rancho do Robinho 2</title>
    <style>
        /* 1. CORREÇÃO DO FUNDO PRETO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a; /* Cor de segurança */
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .background-fixo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* IMPORTANTE: Nome deve ser idêntico ao arquivo no GitHub */
            background-image: url('rancho-novo.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: brightness(0.4);
            z-index: -1;
        }

        /* 2. AJUSTE DO ZOOM E CONTAINER */
        .container {
            width: 90%;
            max-width: 450px; /* Impede que fique gigante ou muito pequeno */
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            box-sizing: border-box;
            position: relative;
        }

        .logo-imagem {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1rem;
            font-style: italic;
            color: #5d4037;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* 3. ENGRENAGEM ADM */
        .admin-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #ccc;
        }

        select, input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .reserva-box {
            background: #fdfaf8;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
        }

        button.principal {
            background-color: #5d4037;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="background-fixo"></div>

    <div class="container">
        <button class="admin-btn" onclick="painelAdm()">⚙️</button>

        <img src="rancho-logo-solo.jpg" alt="Logo" class="logo-imagem">

        <p class="subtitle">"Venha celebrar comigo essa data importante!"</p>
        
        <hr style="opacity: 0.1;">

        <div style="text-align: left; margin-top: 20px;">
            <label><strong>Sugestão para presentes</strong></label>
            <select id="lista">
                <option>Selecione um presente...</option>
                <option>Kit Churrasco</option>
                <option>Jogo de Pratos</option>
                <option>Rede de Descanso</option>
            </select>
        </div>

        <div class="reserva-box">
            <p><strong>Reserve abaixo o seu presente</strong></p>
            <input type="email" placeholder="Seu melhor e-mail" required>
            <button class="principal">RESERVAR AGORA</button>
        </div>

        <footer>© 2026 Rancho do Robinho 2 - Todos os direitos reservados.</footer>
    </div>

    <script>
        function painelAdm() {
            const senhaAdm = "robinho2026";
            let check = prompt("Senha do Administrador:");
            if (check === senhaAdm) {
                let novo = prompt("Digite o novo presente:");
                if (novo) {
                    let s = document.getElementById('lista');
                    let opt = document.createElement('option');
                    opt.text = novo;
                    s.add(opt);
                    alert("Adicionado!");
                }
            } else if (check !== null) {
                alert("Senha incorreta!");
            }
        }
    </script>
</body>
</html>
