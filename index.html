<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Sugestões</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

    <style>
        :root { --laranja: #e28f42; --marrom: #3e2723; --verde: #2e8b57; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: url('capa 2.jpeg') no-repeat center center fixed;
            background-size: cover; color: var(--marrom);
        }
        /* Mural que funciona em Mobile e PC */
        .mural {
            max-width: 550px; 
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.94);
            padding: 25px; 
            border-radius: 15px; 
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        /* Logo centralizada dentro do mural */
        .logo-mural { 
            width: 100%;
            max-width: 220px; 
            height: auto;
            margin-bottom: 10px; 
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        h1 { color: var(--laranja); font-size: 1.8rem; margin-top: 10px; }
        
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #ddd; text-align: left;
        }
        .item.reservado { color: #888; }
        .item.reservado span { text-decoration: line-through; }

        button { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-res { background: var(--verde); color: white; min-width: 100px; }
        .btn-res:disabled { background: #bbb; cursor: not-allowed; }
        
        /* Modal de reserva */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; width: 85%; max-width: 350px; margin: 100px auto; padding: 25px; border-radius: 10px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }

        @media (max-width: 480px) {
            .mural { margin: 15px; padding: 15px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="mural">
        <img src="logo-rancho.png" class="logo-mural" alt="Rancho do Robinho 2">
        <h1>Sugestões do Xerife</h1>
        
        <div id="lista-presentes"></div>
        
        <p style="margin-top:25px; font-size: 0.85rem;">
            <a href="#" onclick="recuperar()" style="color: var(--laranja);">Esqueceu o que reservou?</a>
        </p>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Reservar Item</h3>
            <p style="font-size: 0.9rem;">Insira seus dados para reservar:</p>
            <input type="text" id="nome-con" placeholder="Seu Nome">
            <input type="email" id="email-con" placeholder="Seu E-mail">
            <button class="btn-res" onclick="confirmar()" style="width: 100%;">Confirmar Reserva</button>
            <button onclick="fechar()" style="background:none; color:#888; width: 100%; margin-top: 10px;">Cancelar</button>
        </div>
    </div>
