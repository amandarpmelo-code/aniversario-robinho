<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Gestão de Presentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('rancho-novo.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .admin-access {
            position: fixed; top: 20px; right: 20px; font-size: 24px;
            cursor: pointer; z-index: 1000; color: rgba(255, 255, 255, 0.5);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        
        .logo-header { max-width: 280px; margin-bottom: 20px; filter: drop-shadow(2px 4px 6px black); }

        /* Painel de Cadastro (Só aparece para Admin) */
        #admin-panel {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px dashed #d4af37;
        }

        .gift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .gift-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .gift-card.reserved { opacity: 0.5; pointer-events: none; border: 1px solid red; }
        .gift-card.reserved::after { content: "RESERVADO"; color: red; font-weight: bold; position: absolute; top: 10px; right: 10px; transform: rotate(15deg); }

        input, button { padding: 12px; margin: 5px; border-radius: 5px; border: none; }
        input[type="text"], input[type="email"] { width: 80%; }

        .btn-reserve { background: #d4af37; color: #000; font-weight: bold; cursor: pointer; width: 80%; }
        .btn-delete { background: #ff4444; color: white; cursor: pointer; font-size: 12px; display: none; }

        #admin-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 30px; border-radius: 10px; z-index: 2000; text-align: center;
        }
    </style>
</head>
<body>

    <div class="admin-access" onclick="toggleAdminAuth()"><i class="fas fa-cog"></i></div>

    <div class="container">
        <img src="logo-rancho.png" alt="Logo" class="logo-header">
        <h1>Venha celebrar comigo essa data importante!</h1>
        <p>Reserve abaixo o seu presente</p>

        <div id="admin-panel">
            <h3>Painel do Anfitrião</h3>
            <input type="text" id="new-gift-name" placeholder="Nome do Presente (ex: Jogo de Pratos)">
            <button onclick="addGift()" style="background: #28a745; color: white; cursor:pointer;">Adicionar à Lista</button>
            <button onclick="logoutAdmin()" style="background: #555; color: white; cursor:pointer;">Sair do Modo Editor</button>
        </div>

        <div class="gift-grid" id="gift-list">
            </div>
    </div>

    <div id="admin-modal">
        <h3>Acesso Administrativo</h3>
        <input type="password" id="admin-pass" placeholder="Senha">
        <br><br>
        <button class="btn-reserve" onclick="checkPass()">Entrar</button>
        <button onclick="closeModal()" style="background:none; color:white; cursor:pointer;">Voltar</button>
    </div>

    <script>
        let gifts = JSON.parse(localStorage.getItem('gifts')) || [
            { id: 1, name: "Kit Churrasco", reserved: false },
            { id: 2, name: "Cooler Térmico", reserved: false }
        ];

        let isAdmin = false;

        function renderGifts() {
            const list = document.getElementById('gift-list');
            list.innerHTML = '';

            gifts.forEach(gift => {
                const card = document.createElement('div');
                card.className = `gift-card ${gift.reserved ? 'reserved' : ''}`;
                card.innerHTML = `
                    <button class="btn-delete" style="display: ${isAdmin ? 'block' : 'none'}" onclick="deleteGift(${gift.id})">Excluir</button>
                    <h3>${gift.name}</h3>
                    <input type="email" id="email-${gift.id}" placeholder="Seu e-mail para lembrete" ${gift.reserved ? 'disabled' : ''}>
                    <button class="btn-reserve" onclick="reserveGift(${gift.id})">${gift.reserved ? 'INDISPONÍVEL' : 'RESERVAR'}</button>
                `;
                list.appendChild(card);
            });
            localStorage.setItem('gifts', JSON.stringify(gifts));
        }

        function addGift() {
            const name = document.getElementById('new-gift-name').value;
            if (name) {
                gifts.push({ id: Date.now(), name: name, reserved: false });
                document.getElementById('new-gift-name').value = '';
                renderGifts();
            }
        }

        function deleteGift(id) {
            gifts = gifts.filter(g => g.id !== id);
            renderGifts();
        }

        function reserveGift(id) {
            const email = document.getElementById(`email-${id}`).value;
            if (!email.includes('@')) {
                alert("Por favor, insira um e-mail válido para reserva.");
                return;
            }
            const index = gifts.findIndex(g => g.id === id);
            gifts[index].reserved = true;
            alert("Sucesso! Presente reservado. Não esqueça: " + gifts[index].name);
            renderGifts();
        }

        // Funções de Admin
        function toggleAdminAuth() { document.getElementById('admin-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('admin-modal').style.display = 'none'; }

        function checkPass() {
            if (document.getElementById('admin-pass').value === "1234") {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                closeModal();
                renderGifts();
            } else { alert("Senha incorreta!"); }
        }

        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('admin-panel').style.display = 'none';
            renderGifts();
        }

        // Inicializar
        renderGifts();
    </script>
</body>
</html>
