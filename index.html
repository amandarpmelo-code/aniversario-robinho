<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho do Robinho 2 - Lista de Presentes</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a; /* Cor de fundo caso a imagem falhe */
        }

        /* AJUSTE DO FUNDO - NOME CORRIGIDO */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('rancho-novo.png'); /* Nome exato do seu arquivo no GitHub */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: brightness(0.4); /* Deixa a imagem de fundo mais escura para destacar o convite */
            z-index: -1;
        }

        .admin-login {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 50%;
            z-index: 1000;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .container {
            width: 90%;
            max-width: 500px; /* Diminuí um pouco para aparecer mais o fundo no mobile */
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1rem;
            font-style: italic;
            color: #5d4037;
            margin-bottom: 20px;
        }

        select, input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .reservation-box {
            background: #f9f6f2;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        button {
            background-color: #5d4037;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <button class="admin-login" onclick="alert('Área do ADM em desenvolvimento')">⚙️</button>

    <div class="container">
        <img src="logo-rancho.png" alt="Logo" class="logo-imagem">

        <p class="subtitle">Venha celebrar comigo essa data importante!</p>
        
        <hr style="opacity: 0.1;">

        <div style="text-align: left;">
            <label><strong>Sugestão para presentes</strong></label>
            <select>
                <option>Selecione um presente...</option>
                <option>Kit Churrasco</option>
                <option>Jogo de Pratos</option>
                <option>Bota de Couro</option>
            </select>
        </div>

        <div class="reservation-box">
            <p><strong>Reserve abaixo o seu presente</strong></p>
            <p style="font-size: 0.8rem;">Enviaremos um lembrete para o seu e-mail.</p>
            <input type="email" placeholder="Seu melhor e-mail" required>
            <button>RESERVAR AGORA</button>
        </div>

        <footer>© 2026 Rancho do Robinho 2 - Todos os direitos reservados.</footer>
    </div>

</body>
</html>
